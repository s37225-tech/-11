<!DOCTYPE html>
<html lang="th">
<head>

<style>

}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.card{
    background:rgba(255,255,255,0.1);

    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

img{

    border-radius:50%;

}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2563eb;
}

ul{
    line-height:1.8;
}
</style>

</head>

<p>hyoyeon_7_x</p>
